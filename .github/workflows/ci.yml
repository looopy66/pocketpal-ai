name: CI Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  # Detect if changes are translation-only (src/locales/ files)
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      translation_only: ${{ steps.check.outputs.translation_only }}
    steps:
      - name: Check out code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Check if translation-only
        id: check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          else
            CHANGED=$(git diff --name-only HEAD~1)
          fi

          echo "Changed files:"
          echo "$CHANGED"

          # Check if ALL changed files are under src/locales/
          TRANSLATION_ONLY="true"
          while IFS= read -r file; do
            if [ -z "$file" ]; then
              continue
            fi
            case "$file" in
              src/locales/*) ;;
              *) TRANSLATION_ONLY="false"; break ;;
            esac
          done <<< "$CHANGED"

          echo "translation_only=$TRANSLATION_ONLY" >> "$GITHUB_OUTPUT"
          echo "Translation only: $TRANSLATION_ONLY"

  # Job for linting, type checking, unit testing
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out the repository
      - name: Check out code
        uses: actions/checkout@v3

      # Cache node_modules
      - name: Cache node_modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('yarn.lock') }}

      # Step 2: Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.21.0'
          cache: 'yarn'

      - name: Install Yarn
        run: npm install -g yarn

      # Step 3: Install dependencies and iOS Pods
      - name: Install dependencies
        run: yarn install

      # Step 4: Validate l10n files
      - name: Validate l10n files
        run: node scripts/validate-l10n.js

      # Step 5: Run linters (ESLint)
      - name: Run ESLint
        run: yarn lint

      # Step 5: Run TypeScript type checks
      - name: Run TypeScript type check
        run: yarn typecheck

      # Step 6: Run unit tests (Jest)
      - name: Run unit tests
        run: yarn test --coverage

  # Job for Android build
  build-android:
    runs-on: ubuntu-latest
    needs: [build-and-test, detect-changes]
    steps:
      - name: Check out code
        uses: actions/checkout@v3

      # Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.21.0'
          cache: 'yarn'

      # Cache node_modules
      - name: Cache node_modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('yarn.lock') }}

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install dependencies
        run: yarn install

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # ============================================================
      # Hexagon SDK Setup for NPU/DSP Acceleration
      # ============================================================
      - name: Cache Hexagon SDK
        id: cache-hexagon-sdk
        uses: actions/cache@v3
        with:
          path: ~/.hexagon-sdk
          key: ${{ runner.os }}-hexagon-sdk-6.4.0.2

      - name: Download and Install Hexagon SDK
        if: steps.cache-hexagon-sdk.outputs.cache-hit != 'true'
        run: |
          echo "Downloading Hexagon SDK v6.4.0.2..."
          mkdir -p ~/.hexagon-sdk
          curl -L -o /tmp/hex-sdk.tar.xz \
            "https://github.com/snapdragon-toolchain/hexagon-sdk/releases/download/v6.4.0.2/hexagon-sdk-v6.4.0.2-amd64-lnx.tar.xz"
          
          echo "Extracting Hexagon SDK..."
          tar -xaf /tmp/hex-sdk.tar.xz -C ~/.hexagon-sdk
          
          echo "Cleaning up..."
          rm /tmp/hex-sdk.tar.xz
          
          echo "Hexagon SDK installed successfully!"
          ls -la ~/.hexagon-sdk/6.4.0.2/

      - name: Verify Hexagon SDK Installation
        run: |
          echo "Verifying Hexagon SDK installation..."
          HEXAGON_SDK_ROOT="$HOME/.hexagon-sdk/6.4.0.2"
          HEXAGON_TOOLS_ROOT="$HOME/.hexagon-sdk/6.4.0.2/tools/HEXAGON_Tools/19.0.04"
          
          if [ -d "$HEXAGON_SDK_ROOT" ] && [ -d "$HEXAGON_TOOLS_ROOT" ]; then
            echo "✅ Hexagon SDK detected — enabling DSP build"
            echo "SDK Root: $HEXAGON_SDK_ROOT"
            echo "Tools Root: $HEXAGON_TOOLS_ROOT"
          else
            echo "🚫 Hexagon SDK not found — building CPU-only"
            echo "SDK Root exists: $([ -d "$HEXAGON_SDK_ROOT" ] && echo 'yes' || echo 'no')"
            echo "Tools Root exists: $([ -d "$HEXAGON_TOOLS_ROOT" ] && echo 'yes' || echo 'no')"
          fi

      # ============================================================
      # Build Configuration
      # ============================================================
      - name: Create dummy google-services.json for CI
        run: |
          cat > android/app/google-services.json << 'EOL'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "dummy-project-for-ci",
              "storage_bucket": "dummy-project-for-ci.appspot.com"
            },
            "client": [{
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                "android_client_info": {
                  "package_name": "com.pocketpalai"
                }
              },
              "api_key": [{
                "current_key": "dummy-api-key-for-ci-builds"
              }]
            }]
          }
          EOL

      - name: Create dummy .env file for CI
        run: |
          cat > .env << 'EOL'
          FIREBASE_FUNCTIONS_URL=https://dummy-firebase-url.com

          # PalsHub/Supabase Configuration
          SUPABASE_URL=https://dummy-supabase-url.supabase.co
          SUPABASE_ANON_KEY=dummy-anon-key-for-ci-builds
          PALSHUB_API_BASE_URL=https://dummy-palshub-api.com

          # App Configuration
          APP_URL=pocketpal://app

          # Feature Flags (true/false)
          ENABLE_PALSHUB_INTEGRATION=true
          ENABLE_AUTHENTICATION=true
          ENABLE_OFFLINE_MODE=true

          # Google Sign-In Configuration
          GOOGLE_IOS_CLIENT_ID=dummy-ios-client-id.apps.googleusercontent.com
          GOOGLE_WEB_CLIENT_ID=dummy-web-client-id.apps.googleusercontent.com
          EOL

      - name: Create dummy release keystore for CI
        working-directory: android/app
        run: |
          # Generate a dummy keystore for CI builds
          keytool -genkeypair -v \
            -storetype PKCS12 \
            -keystore pocketpal-release-key.keystore \
            -alias pocketpal_key_alias \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass dummy-ci-password \
            -keypass dummy-ci-password \
            -dname "CN=CI Build, OU=CI, O=PocketPal, L=CI, S=CI, C=US"

      # ============================================================
      # Build Android Release (arm64-v8a only)
      # ============================================================
      - name: Build Android Release (arm64-v8a only)
        working-directory: android
        env:
          APP_RELEASE_STORE_PASSWORD: dummy-ci-password
          APP_RELEASE_KEY_PASSWORD: dummy-ci-password
        run: |
          # Set Hexagon SDK environment variables (must use absolute path)
          export HEXAGON_SDK_ROOT="$HOME/.hexagon-sdk/6.4.0.2"
          export HEXAGON_TOOLS_ROOT="$HOME/.hexagon-sdk/6.4.0.2/tools/HEXAGON_Tools/19.0.04"
          
          echo "HEXAGON_SDK_ROOT: $HEXAGON_SDK_ROOT"
          echo "HEXAGON_TOOLS_ROOT: $HEXAGON_TOOLS_ROOT"
          
          # Build only arm64-v8a architecture
          ./gradlew assembleRelease

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk-arm64
          path: android/app/build/outputs/apk/release/app-release.apk
